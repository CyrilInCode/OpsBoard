name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Backend verify
        run: mvn -B -f backend/pom.xml verify

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test -- --run
      - name: Build
        run: npm run build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config

  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Backend tests and coverage
        run: mvn -B -f backend/pom.xml verify
      - name: Frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend coverage
        working-directory: frontend
        run: npm run test:coverage
      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >
            backend/gateway/target/site/jacoco/jacoco.xml,
            backend/incident-service/target/site/jacoco/jacoco.xml,
            backend/team-service/target/site/jacoco/jacoco.xml
          flags: backend
          name: opsboard-backend
          fail_ci_if_error: true
          verbose: true
      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: frontend
          name: opsboard-frontend
          fail_ci_if_error: true
          verbose: true
      - name: Frontend build
        working-directory: frontend
        run: npm run build
      - name: Check SonarQube Cloud configuration
        env:
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "::error title=Missing SONAR_PROJECT_KEY::Create a repository variable named SONAR_PROJECT_KEY in Settings > Secrets and variables > Actions > Variables."
            exit 1
          fi
          if [ -z "$SONAR_ORGANIZATION" ]; then
            echo "::error title=Missing SONAR_ORGANIZATION::Create a repository variable named SONAR_ORGANIZATION in Settings > Secrets and variables > Actions > Variables."
            exit 1
          fi
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error title=Missing SONAR_TOKEN::Create a repository secret named SONAR_TOKEN in Settings > Secrets and variables > Actions > Secrets."
            exit 1
          fi
      - name: SonarQube Cloud analysis
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.qualitygate.wait=true
